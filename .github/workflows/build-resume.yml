name: Build Resume

on:
  push:
    branches: [main]
    paths:
      - "resume.md"
      - ".github/workflows/build-resume.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Validate resume file
        run: |
          test -f resume.md || (echo "❌ resume.md not found" && exit 1)
          test -s resume.md || (echo "❌ resume.md is empty" && exit 1)
          echo "✅ resume.md validated"

      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Set up Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Create HTML template
        run: |
          cat > template.html <<'EOF'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>Resume - Caner Türkmen</title>
            <style>
              body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
                line-height: 1.22;
                max-width: 860px;
                margin: 20px auto;
                padding: 0 18px;
                color: #111;
                font-size: 13px;
              }

              h1, h2, h3 {
                margin-bottom: 0.15em;
              }

              h1 {
                font-size: 1.7rem;
                border-bottom: 2px solid #ddd;
                padding-bottom: 0.12em;
                margin-top: 0;
              }

              h2 {
                font-size: 1rem;
                margin-top: 0.9em;
                border-bottom: 1px solid #eee;
                padding-bottom: 0.12em;
              }

              h3 {
                font-size: 0.93rem;
                margin-top: 0.55em;
                margin-bottom: 0.1em;
              }

              p, li {
                font-size: 0.9rem;
              }

              p {
                margin-top: 0.15em;
                margin-bottom: 0.25em;
              }

              ul {
                padding-left: 1rem;
                margin-top: 0.15em;
                margin-bottom: 0.35em;
              }

              li {
                margin-bottom: 0.12em;
              }

              hr {
                border: 0;
                border-top: 1px solid #eee;
                margin: 0.7em 0;
              }

              a {
                color: #0a66c2;
                text-decoration: none;
              }

              a:hover {
                text-decoration: underline;
              }

              strong {
                font-weight: 600;
              }

              @page {
                size: Letter;
                margin: 0.55in 0.6in;
              }

              @media print {
                body {
                  margin: 0;
                  padding: 0;
                  max-width: 100%;
                  font-size: 12.5px;
                  line-height: 1.16;
                }

                h1, h2, h3 {
                  page-break-after: avoid;
                  break-after: avoid;
                }

                ul, p {
                  page-break-inside: auto;
                  break-inside: auto;
                }

                a[href^="http"]:after {
                  content: "";
                }
              }
            </style>
          </head>
          <body>
          $body$
          </body>
          </html>
          EOF

      - name: Build HTML
        run: |
          pandoc resume.md \
            --from markdown \
            --to html5 \
            --standalone \
            --template=template.html \
            -o resume.html
          echo "✅ HTML generated"

      - name: Build PDF with Chrome
        run: |
          "${{ steps.setup-chrome.outputs.chrome-path }}" \
            --headless \
            --disable-gpu \
            --no-sandbox \
            --print-to-pdf=resume.pdf \
            "file://$GITHUB_WORKSPACE/resume.html"

          test -f resume.pdf || (echo "❌ resume.pdf not created" && exit 1)
          test -s resume.pdf || (echo "❌ resume.pdf is empty" && exit 1)
          echo "✅ PDF generated"

      - name: Add build metadata
        run: |
          sed -i 's|</body>|<!-- Generated on '"$(date -u)"' by GitHub Actions -->\n</body>|' resume.html

          {
            echo "Build Date: $(date -u)"
            echo "Commit: $GITHUB_SHA"
            echo "Workflow: $GITHUB_WORKFLOW"
            echo "Run ID: $GITHUB_RUN_ID"
          } > build-info.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: resume-build
          path: |
            resume.html
            resume.pdf
            build-info.txt
          retention-days: 90

      - name: Prepare Pages artifact
        run: |
          mkdir -p site
          cp resume.html site/index.html
          cp resume.pdf site/resume.pdf
          touch site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
