name: Build Resume

on:
  push:
    branches: [main]
    paths:
      - "resume.md"
      - ".github/workflows/build-resume.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/apt
            ~/.cache/pip
          key: ${{ runner.os }}-deps-${{ hashFiles('.github/workflows/build-resume.yml') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Validate resume file
        run: |
          if [ ! -f "resume.md" ]; then
            echo "❌ resume.md not found"
            exit 1
          fi
          if [ ! -s "resume.md" ]; then
            echo "❌ resume.md is empty"
            exit 1
          fi
          echo "✅ resume.md validated successfully"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc python3-pip

      - name: Install WeasyPrint
        run: |
          # Install WeasyPrint with compatible dependencies
          pip3 install --upgrade pip
          pip3 install WeasyPrint==61.2
          # Install additional fonts for better typography
          sudo apt-get install -y fonts-liberation fonts-dejavu-core

      - name: Create HTML template
        run: |
          cat > template.html <<'EOF'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>Resume - Caner Türkmen</title>
            <style>
              body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
                line-height: 1.28;
                max-width: 860px;
                margin: 24px auto;
                padding: 0 18px;
                color: #111;
                font-size: 14px;
              }

              h1, h2, h3 {
                margin-bottom: 0.2em;
              }

              h1 {
                font-size: 1.8rem;
                border-bottom: 2px solid #ddd;
                padding-bottom: 0.15em;
                margin-top: 0;
              }

              h2 {
                font-size: 1.05rem;
                margin-top: 1em;
                border-bottom: 1px solid #eee;
                padding-bottom: 0.15em;
              }

              h3 {
                font-size: 0.95rem;
                margin-top: 0.7em;
                margin-bottom: 0.15em;
              }

              p, li {
                font-size: 0.92rem;
              }

              p {
                margin-top: 0.2em;
                margin-bottom: 0.35em;
              }

              ul {
                padding-left: 1rem;
                margin-top: 0.2em;
                margin-bottom: 0.45em;
              }

              li {
                margin-bottom: 0.15em;
              }

              hr {
                border: 0;
                border-top: 1px solid #eee;
                margin: 0.8em 0;
              }

              a {
                color: #0a66c2;
                text-decoration: none;
              }

              a:hover {
                text-decoration: underline;
              }

              strong {
                font-weight: 600;
              }

              @page {
                size: Letter;
                margin: 0.75in 0.75in;
              }

              @media print {
                body {
                  margin: 0;
                  padding: 0;
                  max-width: 100%;
                  line-height: 1.22;
                  font-size: 13px;
                }

                h1 {
                  margin-top: 0;
                }

                h2, h3 {
                  break-after: avoid;
                  page-break-after: avoid;
                }

                ul, p {
                  break-inside: avoid;
                  page-break-inside: avoid;
                }

                .no-print {
                  display: none !important;
                }

                a[href^="http"]:after {
                  content: " (" attr(href) ")";
                  font-size: 0.8em;
                  color: #666;
                }
              }
            </style>
          </head>
          <body>
          $body$
          </body>
          </html>
          EOF

      - name: Build HTML
        run: |
          pandoc resume.md \
            --from markdown \
            --to html5 \
            --standalone \
            --template=template.html \
            -o resume.html
          echo "✅ HTML generated successfully"

      - name: Build PDF with WeasyPrint
        run: |
          # Try WeasyPrint first
          if weasyprint resume.html resume.pdf 2>/dev/null; then
            echo "✅ PDF generated with WeasyPrint successfully"
          else
            echo "❌ WeasyPrint failed, trying alternative method..."
            # Fallback to Chromium if WeasyPrint fails
            sudo apt-get install -y chromium-browser
            chromium-browser --headless --disable-gpu --no-sandbox --no-pdf-header-footer --print-to-pdf=resume.pdf "file://$(pwd)/resume.html"
            echo "✅ PDF generated with Chromium fallback"
          fi

          # Verify PDF was created and has reasonable size
          if [ -f "resume.pdf" ] && [ $(stat -f%z "resume.pdf" 2>/dev/null || stat -c%s "resume.pdf") -gt 1000 ]; then
            echo "✅ PDF validation passed"
          else
            echo "❌ PDF validation failed"
            exit 1
          fi

      - name: Add build metadata
        run: |
          # Add build info to HTML
          sed -i 's|</body>|<!-- Generated on '$(date -u)' by GitHub Actions -->\n</body>|' resume.html

          # Create build info file
          echo "Build Date: $(date -u)" > build-info.txt
          echo "Commit: $GITHUB_SHA" >> build-info.txt
          echo "Workflow: $GITHUB_WORKFLOW" >> build-info.txt
          echo "Run ID: $GITHUB_RUN_ID" >> build-info.txt

          echo "✅ Build metadata added"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: resume-build
          path: |
            resume.html
            resume.pdf
            build-info.txt
          retention-days: 90

      - name: Prepare Pages artifact
        run: |
          mkdir -p site
          cp resume.html site/index.html
          touch site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deployment notification
        if: success()
        run: |
          echo "🚀 Resume successfully deployed to: ${{ steps.deployment.outputs.page_url }}"
          echo "📄 Direct PDF link: ${{ steps.deployment.outputs.page_url }}resume.pdf" || true
