name: Build Resume

on:
  push:
    branches: [main]
    paths:
      - "resume.md"
      - ".github/workflows/build-resume.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Create HTML template
        run: |
          cat > template.html <<'EOF'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>Resume - Caner Türkmen</title>
            <style>
              body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
                line-height: 1.5;
                max-width: 900px;
                margin: 40px auto;
                padding: 0 24px;
                color: #111;
              }
              h1, h2, h3 {
                margin-bottom: 0.3em;
              }
              h1 {
                font-size: 2rem;
                border-bottom: 2px solid #ddd;
                padding-bottom: 0.2em;
              }
              h2 {
                font-size: 1.2rem;
                margin-top: 1.5em;
                border-bottom: 1px solid #eee;
                padding-bottom: 0.2em;
              }
              h3 {
                font-size: 1rem;
                margin-top: 1em;
              }
              p, li {
                font-size: 0.95rem;
              }
              ul {
                padding-left: 1.2rem;
              }
              hr {
                border: 0;
                border-top: 1px solid #eee;
                margin: 1.5em 0;
              }
              a {
                color: #0a66c2;
                text-decoration: none;
              }
              a:hover {
                text-decoration: underline;
              }
              @media print {
                body {
                  margin: 0;
                  max-width: 100%;
                }
              }
            </style>
          </head>
          <body>
          $body$
          </body>
          </html>
          EOF

      - name: Build HTML
        run: |
          pandoc resume.md \
            --from markdown \
            --to html5 \
            --standalone \
            --template=template.html \
            -o resume.html

      - name: Install Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser || sudo apt-get install -y chromium

      - name: Build PDF from HTML
        run: |
          CHROME_BIN=$(command -v chromium-browser || command -v chromium)
          "$CHROME_BIN" \
            --headless \
            --disable-gpu \
            --no-sandbox \
            --print-to-pdf=resume.pdf \
            file://$GITHUB_WORKSPACE/resume.html

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: resume-build
          path: |
            resume.html
            resume.pdf

      - name: Prepare Pages artifact
        run: |
          mkdir -p site
          cp resume.html site/index.html
          touch site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
